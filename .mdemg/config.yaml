# MDEMG Project Configuration
# Generated by: mdemg init
#
# This file sets common configuration values. For the full 160+ env vars,
# see .env.example or docs/features/unified-cli.md.
#
# Priority (lowest to highest):
#   1. Defaults (in FromEnv)
#   2. This file (.mdemg/config.yaml)
#   3. .env file
#   4. Environment variables
#   5. CLI flags
#
# IMPORTANT: Do NOT put secrets (passwords, API keys) in this file.
# Use .env (gitignored) or environment variables for secrets.

neo4j:
    uri: bolt://localhost:7687
    user: neo4j
    bolt_port: 7687
    http_port: 7474
server:
    port: 9999
llm:
    provider: openai
    model: gpt-5-nano
embedding:
    provider: openai
    model: text-embedding-3-large
backup:
    enabled: true
    storage_dir: .mdemg/backups
    interval_hours: 24
    retention_count: 2
plugins:
    enabled: true
    dir: /opt/homebrew/share/mdemg/plugins
jiminy:
    enabled: true
    synthesis_enabled: true
    synthesis_provider: openai
    synthesis_model: gpt-5.4-nano
    evaluate_enabled: true
    evaluate_llm_provider: openai
    evaluate_llm_model: gpt-5.4-nano
