# MDEMG Docker Compose — Primary deployment configuration
# Usage: docker compose up -d
# Init:  mdemg init (generates .env with dynamic port assignments)
#
# IMPORTANT: All host ports are dynamically assigned by `mdemg init`.
# The .env file MUST exist with port assignments before running compose.
# Run `mdemg init` first — it scans for free ports and generates .env.

services:
  mdemg:
    image: ghcr.io/reh3376/mdemg:${MDEMG_VERSION:-latest}
    # For local development builds, uncomment the next two lines and comment out image:
    # build:
    #   context: .
    #   dockerfile: deploy/docker/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${MDEMG_PORT}:9999"
    environment:
      LISTEN_ADDR: ":9999"
      LISTEN_PORT: "9999"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      LOG_SKIP_HEALTH: "true"

      # Neo4j (internal Docker network — always bolt://neo4j:7687)
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASS: "${NEO4J_PASS:-testpassword}"
      NEO4J_MAX_POOL_SIZE: "${NEO4J_MAX_POOL_SIZE:-100}"

      # TimescaleDB (internal Docker network — always timescaledb:5432)
      TSDB_HOST: "timescaledb"
      TSDB_PORT: "5432"
      TSDB_USER: "${TSDB_USER:-mdemg}"
      TSDB_PASSWORD: "${TSDB_PASSWORD:-mdemg_metrics}"
      TSDB_DBNAME: "${TSDB_DBNAME:-mdemg_metrics}"
      TSDB_ENABLED: "true"
      TSDB_AUTO_MIGRATE: "true"
      TSDB_OPTIONAL: "true"
      AUTO_MIGRATE: "true"

      # Embedding provider
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"

      # Rate limiting
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_RPS: "${RATE_LIMIT_RPS:-100}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-200}"

      # Circuit breaker
      CIRCUIT_BREAKER_ENABLED: "${CIRCUIT_BREAKER_ENABLED:-true}"
      CIRCUIT_BREAKER_THRESHOLD: "${CIRCUIT_BREAKER_THRESHOLD:-5}"
      CIRCUIT_BREAKER_TIMEOUT: "${CIRCUIT_BREAKER_TIMEOUT:-30}"

      # Authentication
      AUTH_ENABLED: "${AUTH_ENABLED:-false}"
      AUTH_MODE: "${AUTH_MODE:-apikey}"
      AUTH_API_KEYS: "${MDEMG_API_KEYS}"

      # Metrics
      METRICS_ENABLED: "${METRICS_ENABLED:-true}"
      METRICS_NAMESPACE: "${METRICS_NAMESPACE:-mdemg}"

      # Neural sidecar (J17 protocol)
      J17_SIDECAR_URL: "http://neural-sidecar:8000"
      J17_SIDECAR_MODE: "${J17_SIDECAR_MODE:-shadow}"

      # LLM / Reranker
      LLM_PROVIDER: "${LLM_PROVIDER:-openai}"
      LLM_MODEL: "${LLM_MODEL:-gpt-5-nano}"
      RERANK_ENABLED: "${RERANK_ENABLED:-true}"
      RERANK_PROVIDER: "${RERANK_PROVIDER:-openai}"
      RERANK_MODEL: "${RERANK_MODEL:-gpt-5.4}"
      RERANK_TOP_N: "${RERANK_TOP_N:-50}"
      RERANK_WEIGHT: "${RERANK_WEIGHT:-0.50}"
      RERANK_TIMEOUT_MS: "${RERANK_TIMEOUT_MS:-10000}"

      # Campaign task activation (set in .env to enable training data collection)
      QUERY_CLASSIFY_ENABLED: "${QUERY_CLASSIFY_ENABLED:-true}"
      INTENT_ENABLED: "${INTENT_ENABLED:-false}"
      JIMINY_ENABLED: "${JIMINY_ENABLED:-false}"
      JIMINY_SYNTHESIS_ENABLED: "${JIMINY_SYNTHESIS_ENABLED:-true}"
      JIMINY_SYNTHESIS_PROVIDER: "${JIMINY_SYNTHESIS_PROVIDER:-}"
      JIMINY_SYNTHESIS_MODEL: "${JIMINY_SYNTHESIS_MODEL:-}"
      JIMINY_EVALUATE_ENABLED: "${JIMINY_EVALUATE_ENABLED:-true}"
      JIMINY_EVALUATE_LLM_PROVIDER: "${JIMINY_EVALUATE_LLM_PROVIDER:-}"
      JIMINY_EVALUATE_LLM_MODEL: "${JIMINY_EVALUATE_LLM_MODEL:-}"
      EMERGENCE_ENABLED: "${EMERGENCE_ENABLED:-false}"
      LLM_INTERACTION_LOGGING: "${LLM_INTERACTION_LOGGING:-true}"

      # Graceful shutdown
      GRACEFUL_SHUTDOWN_TIMEOUT: "${GRACEFUL_SHUTDOWN_TIMEOUT:-30}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      neo4j:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - mdemg-net

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASS:-testpassword}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: "${NEO4J_PAGECACHE:-512M}"
      NEO4J_dbms_memory_heap_initial__size: "${NEO4J_HEAP_INIT:-256M}"
      NEO4J_dbms_memory_heap_max__size: "${NEO4J_HEAP_MAX:-512M}"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASS:-testpassword} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mdemg-net

  timescaledb:
    image: timescale/timescaledb:2.25.1-pg16
    restart: unless-stopped
    ports:
      - "${TSDB_HOST_PORT}:5432"
    environment:
      POSTGRES_DB: "${TSDB_DBNAME:-mdemg_metrics}"
      POSTGRES_USER: "${TSDB_USER:-mdemg}"
      POSTGRES_PASSWORD: "${TSDB_PASSWORD:-mdemg_metrics}"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TSDB_USER:-mdemg} -d ${TSDB_DBNAME:-mdemg_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdemg-net

  neural-sidecar:
    image: ghcr.io/reh3376/mdemg-neural-sidecar:${MDEMG_VERSION:-latest}
    # For local development builds, uncomment the next line and comment out image:
    # build: ./neural
    restart: unless-stopped
    ports:
      - "${NEURAL_PORT}:8000"
    environment:
      NEURAL_RERANK_MODEL: ${NEURAL_RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      NEURAL_NLI_MODEL: ${NEURAL_NLI_MODEL:-cross-encoder/nli-MiniLM2-L6-H768}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mdemg-net

  grafana:
    image: grafana/grafana:10.2.2
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/dashboards/mdemg-overview.json"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_INSTALL_PLUGINS: "kniepdennis-neo4j-datasource,hamedkarbasi93-nodegraphapi-datasource"
      TSDB_PASSWORD: "${TSDB_PASSWORD:-mdemg_metrics}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/docker/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./deploy/docker/grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - timescaledb
    networks:
      - mdemg-net

volumes:
  neo4j_data:
  neo4j_logs:
  tsdb_data:
  grafana_data:

networks:
  mdemg-net:
    driver: bridge
